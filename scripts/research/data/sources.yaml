# =============================================================================
# 期货基本面信源白名单 + 黑名单
# 字段：name / tier / url_pattern / reliability
#       reliability: high（官方/数据）/ medium（行业付费）/ low（黑名单）
# =============================================================================

meta:
  updated: 2026-06-10
  policy: "三源印证：≥3 独立信源才标 verified=true"

# ---------- 🟢 官方/数据类（高可信） ----------
official_sources:
  - name: "大连商品交易所公告"
    url: "http://www.dce.com.cn/"
    reliability: high
    covers: [C, M, Y, P, JM, I, J, BB, FB, LH, PP, L, V, EG, EB, CS, RR]

  - name: "上海期货交易所公告"
    url: "https://www.shfe.com.cn/"
    reliability: high
    covers: [CU, AL, ZN, PB, AU, AG, NI, SN, RB, WR, HC, SS, FU, BU, RU, SP, AO, AD, AC, BC]

  - name: "郑州商品交易所公告"
    url: "http://www.czce.com.cn/"
    reliability: high
    covers: [SR, CF, TA, MA, FG, SA, OI, RM, ZC, SM, SF, UR, LR, AP, CJ, PK, EC, PR]

  - name: "广州期货交易所公告"
    url: "http://www.gfex.com.cn/"
    reliability: high
    covers: [SI, LC, BRF]

  - name: "上海国际能源交易中心"
    url: "https://www.ine.cn/"
    reliability: high
    covers: [SC, LU, NR, BC]

  - name: "中国证监会"
    url: "http://www.csrc.gov.cn/"
    reliability: high
    covers: [ALL]

  - name: "国家统计局"
    url: "http://www.stats.gov.cn/"
    reliability: high
    covers: [ALL]

  - name: "农业农村部"
    url: "http://www.moa.gov.cn/"
    reliability: high
    covers: [C, M, Y, P, CF, SR, RM, CJ, AP, LH, J]

  - name: "海关总署"
    url: "http://www.customs.gov.cn/"
    reliability: high
    covers: [CU, AL, NI, I, M, Y, P, SR, CF, RM]

  - name: "USDA 美国农业部"
    url: "https://www.usda.gov/"
    reliability: high
    covers: [C, M, Y, P, SR, CF, RM]

  - name: "NOAA 美国海洋和大气管理局（厄尔尼诺/拉尼娜权威）"
    url: "https://www.cpc.ncep.noaa.gov/"
    reliability: high
    covers: [C, M, Y, P, SR, CF, RM]  # 厄尔尼诺→全球粮油

  - name: "中国气象局"
    url: "http://www.cma.gov.cn/"
    reliability: high
    covers: [C, M, Y, P, SR, CF, CJ, AP]

  - name: "FAO 联合国粮农组织"
    url: "https://www.fao.org/"
    reliability: high
    covers: [C, M, Y, P, SR, CF, RM]

  - name: "中金所 中国金融期货交易所"
    url: "http://www.cffex.com.cn/"
    reliability: high
    covers: [ALL]  # 股指/国债，宏观信号

  - name: "中国期货业协会"
    url: "http://www.cfachina.org/"
    reliability: high
    covers: [ALL]  # 行业月报/数据


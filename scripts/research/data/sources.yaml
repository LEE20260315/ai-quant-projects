# ---------- 🔴 黑名单（低质信源，跳过） ----------
blacklisted:
  - pattern: "mp.weixin.qq.com"   # 微信公众号
    reason: "立场可能带仓位，标题党普遍"
  - pattern: "toutiao.com/group"  # 今日头条自媒体
    reason: "作者水平参差，需一手源印证"
  - pattern: "weibo.com"          # 微博
    reason: "情绪化、滞后"
  - pattern: "qq.com"             # QQ 群/兴趣部落
    reason: "未经核实的消息聚合"

